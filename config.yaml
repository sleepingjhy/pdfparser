# MinerU PDF 提取管道配置
# =========================

api:
  base_url: "https://mineru.net/api/v4"

  # 多API并发配置
  # ==============
  # 配置多个API时，会自动并发处理：
  # - API-1 处理文件 1-50
  # - API-2 处理文件 51-100
  # - 完成后自动获取下一批任务
  # - 达到配额后自动停止，其他API继续
  api_configs:
    - api_key: "YOUR_API_KEY_1_HERE"
      daily_limit: 10000  # 第一个API每日限额（0表示不限制）
      name: "API-1"       # 可选：API名称标识，便于日志识别
    - api_key: "YOUR_API_KEY_2_HERE"
      daily_limit: 10000  # 第二个API每日限额
      name: "API-2"       # 可选：API名称标识

  # 并发控制
  enable_concurrent: true            # 是否启用并发处理（false则串行处理，更稳定但较慢）
  concurrency: 50                    # 并发上传数（每个API的并发数，enable_concurrent=true时生效）
  batch_size: 25                    # 每批文件数
  poll_interval_sec: 30             # 轮询间隔(秒)
  max_poll_minutes: 60              # 单批超时(分钟)
  retry_max: 3                      # 每个文件最大重试次数
  retry_backoff_sec: 60             # 初始退避时间(秒)
  batch_delay_sec: 5                # 等待其他API上传完成后，再等待的时间（秒）
  batch_limit: 2000                 # 每处理多少个文件后暂停
  batch_pause_minutes: 10           # 达到 batch_limit 后暂停的分钟数

paths:
  pdf_input: "E:\\data\\pdf"
  raw_output: "E:\\data\\json\\raw"
  final_output: "E:\\data\\json\\final"
  fallback_final_outputs:
    - "G:\\data\\json\\final"
    - "D:\\data\\json\\final"
  min_free_gb: 0.1                  # 小于该阈值时切到下一输出目录
  checkpoint_db: "C:\\Users\\10517\\Desktop\\minerU\\checkpoint.db"
  failed_db: "C:\\Users\\10517\\Desktop\\minerU\\failed.db"  # 失败文件记录数据库
  log_file: "C:\\Users\\10517\\Desktop\\minerU\\pipeline.log"

extraction:
  is_ocr: true                      # 启用OCR(扫描版PDF需要)
  enable_formula: true              # 启用公式识别
  enable_table: false               # 禁用表格识别(不需要)
  language: "ch"                    # 中文
  model_version: "pipeline"
         # pipeline 或 vlm

# 跳过英文版论文(CNKI英文版期刊的文件名前缀)
# 这些是中文期刊附带的英文扩展摘要/英文版，不是中文正文
exclude_prefixes:
  - "JLSC"    # Journal of Library Science in China (中国图书馆学报英文版)
  - "SHEK"    # Social Sciences in China (中国社会科学英文版)
  - "DZXE"    # Acta Geologica Sinica English Edition (地质学报英文版)
  - "GUDL"    # Journal of Geographical Sciences (地理学报英文版)
  - "ZGDE"    # Journal of Geographical Sciences (地理学报英文版另一代码)
