  concurrency: 5                    # 并发上传数
  batch_size: 10                    # 每批文件数
  poll_interval_sec: 30             # 轮询间隔(秒)
  max_poll_minutes: 60              # 单批超时(分钟)
  retry_max: 3                      # 每个文件最大重试次数
  retry_backoff_sec: 60             # 初始退避时间(秒)

paths:
  pdf_input: "E:\\Crawler\\data\\pdf"
  raw_output: "E:\\MinerU\\data\\raw"
  final_output: "E:\\MinerU\\data\\output"
  checkpoint_db: "E:\\MinerU\\data\\checkpoint.db"
  log_file: "E:\\MinerU\\pipeline.log"

extraction:
  is_ocr: true                      # 启用OCR(扫描版PDF需要)
  enable_formula: true              # 启用公式识别
  enable_table: false               # 禁用表格识别(不需要)
  language: "ch"                    # 中文
  model_version: "pipeline"         # pipeline 或 vlm

# 跳过英文版论文(CNKI英文版期刊的文件名前缀)
# 这些是中文期刊附带的英文扩展摘要/英文版，不是中文正文
exclude_prefixes:
  - "JLSC"    # Journal of Library Science in China (中国图书馆学报英文版)
  - "SHEK"    # Social Sciences in China (中国社会科学英文版)
  - "DZXE"    # Acta Geologica Sinica English Edition (地质学报英文版)
  - "GUDL"    # Journal of Geographical Sciences (地理学报英文版)
  - "ZGDE"    # Journal of Geographical Sciences (地理学报英文版另一代码)
